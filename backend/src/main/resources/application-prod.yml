spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

logging:
  level:
    com.diet: info

wechat:
  app-id: ${WECHAT_APP_ID}
  app-secret: ${WECHAT_APP_SECRET}
  mock-enabled: false

tencent:
  ocr:
    secret-id: ${TENCENT_OCR_SECRET_ID}
    secret-key: ${TENCENT_OCR_SECRET_KEY}
    region: ${TENCENT_OCR_REGION:ap-guangzhou}
    mock-enabled: false

auth:
  token-secret: ${AUTH_TOKEN_SECRET}
  token-expire-days: ${AUTH_TOKEN_EXPIRE_DAYS:30}
